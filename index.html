    inset: 0;
    background: radial-gradient(ellipse 75% 65% at 50% 50%, rgba(255,250,240,0.72) 0%, rgba(255,250,240,0.65) 45%, rgba(255,250,240,0.3) 80%, transparent 100%);

  /* ── CONTENT LAYOUT ── */
  .cert-content {
    position: relative;
    z-index: 20;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
    padding: 85px 130px 65px 130px;
    box-sizing: border-box;
  }

  /* Section 1: Header */
  .header-block {
    text-align: center;
    margin-top: 5px;
  }
  .main-title {
    font-family: 'Noto Serif Bengali', serif;
    font-weight: 900;
    font-size: 62pt;
    color: #7a0030;
    margin: 0;
    line-height: 1.2;
    letter-spacing: normal;
    text-rendering: optimizeLegibility;
    text-shadow: 0 4px 15px rgba(255,250,240,0.95), 0 2px 5px rgba(0,0,0,0.2);
  }
  .organizer {
    font-family: 'Noto Sans Bengali', sans-serif;
    font-weight: 600;
    font-size: 17pt;
    color: #3a1500;
    margin: 12px 0 0 0;
    letter-spacing: normal;
    text-shadow: 0 1px 6px rgba(255,250,240,1);
  }

  /* Section 2: Gold Divider */
  .gold-divider {
    width: 60%;
    height: 2px;
    margin: 0 auto;
    background: linear-gradient(to right, transparent, #f5d060, #c8960c, #f5d060, transparent);
    box-shadow: 0 0 10px rgba(200,150,12,0.5);
  }

  /* Section 3: Body Text */
  .body-text-box {
    padding: 10px 30px 25px 30px;
    text-align: center;
    font-family: 'Noto Sans Bengali', sans-serif;
    font-weight: 600;
    font-size: 22pt;
    color: #120808;
    line-height: 2.2;
    margin: 0 auto;
    width: 95%;
    letter-spacing: normal;
    text-rendering: optimizeLegibility;
    text-shadow: 0 2px 10px rgba(255,250,240,0.95), 0 0 15px rgba(255,250,240,0.8);
  }
  .body-text-line-wrapper {
    margin-top: 25px;
  }
  .blank {
    display: inline-block;
    border-bottom: 3px solid #3a1500;
    vertical-align: text-bottom;
    text-align: center;
    padding: 0 10px;
    color: #7a0030;
    font-weight: 800;
  }

  /* Section 4: Date & Place */
  .date-place {
    display: flex;
    justify-content: space-between;
    width: 75%;
    margin: 0 auto;
    font-family: 'Noto Sans Bengali', sans-serif;
    font-weight: 700;
    font-size: 18pt;
    color: #3a1500;
    text-shadow: 0 1px 5px rgba(255,250,240,1);
  }

  /* Section 5: Signatures */
  .signature-block {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 25px;
    padding: 0 30px;
  }
  .sig-col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .sig-line-wrapper {
    position: relative;
    width: 130px;
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .sig-line-wrapper::before {
    content: '✦';
    color: #c8960c;
    font-size: 14pt;
    position: absolute;
    top: -26px;
    text-shadow: 0 1px 2px rgba(120,0,40,0.4);
  }
  .sig-line {
    width: 100%;
    border-top: 3px solid #7a0030;
  }
  .sig-role {
    font-family: 'Noto Sans Bengali', sans-serif;
    font-weight: 900;
    font-size: 26pt;
    color: #7a0030;
    letter-spacing: normal;
    text-shadow: 0 3px 8px rgba(120,0,40,0.5);
    background: rgba(255, 250, 240, 0.88);
    padding: 4px 30px;
    border-radius: 50px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    margin-top: 4px;
  }

  /* Download Button */
  .downloadBtn {
    background: linear-gradient(135deg, #c8960c, #f5d060, #c8960c);
    color: #3a1500;
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 14pt;
    font-weight: 700;
    padding: 14px 48px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(200,150,12,0.4);
    margin-top: 28px;
    letter-spacing: 1px;
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 100;
  }
  .downloadBtn:hover {
    transform: scale(1.04);
    box-shadow: 0 8px 30px rgba(200,150,12,0.6);
  }

  /* Print */
  @media print {
    body { background: none; padding: 0; }
    .downloadBtn, .controls-wrapper { display: none; }
    .scale-wrapper { transform: none !important; width: 297mm; height: 210mm; }
    #certificate { width: 297mm; height: 210mm; }
  }
</style>
</head>
<body>



  <div class="scale-wrapper" id="scaleWrapper">
    <div id="certificate">
      <!-- Backgrounds -->
      <div class="bg-image"></div>
      <div class="bg-vignette"></div>

      <!-- Multi-Layer Border System -->
      <div class="border-outer"></div>
      <div class="border-cream"></div>
      <div class="border-inner-gold"></div>
      <div class="alpona-strip">
        <div class="alpona-edge alpona-top"></div>
        <div class="alpona-edge alpona-bottom"></div>
        <div class="alpona-edge alpona-left"></div>
        <div class="alpona-edge alpona-right"></div>
      </div>
      <div class="border-inner-crimson"></div>

      <!-- Corner Ornaments -->
      <div class="corner-ornament corner-tl">❧</div>
      <div class="corner-ornament corner-tr">❧</div>
      <div class="corner-ornament corner-bl">❧</div>
      <div class="corner-ornament corner-br">❧</div>

      <!-- Content -->
      <div class="cert-content">

        <!-- 1. Header -->
        <div class="header-block">
          <div class="main-title">আবার বসন্ত, ২০২৬</div>
          <div class="organizer">পরিচালনায়: ১৬ নম্বর ওয়ার্ড বসন্ত উৎসব কমিটি</div>
        </div>

        <!-- 2. Divider -->
        <div class="gold-divider"></div>

        <!-- 3. Body Text -->
        <div class="body-text-box">
          <div class="body-text-line-wrapper">
            <span class="blank" style="min-width: 260px;"></span> প্রতিযোগিতায় <span class="blank" style="min-width: 200px;"></span> বিভাগে <span class="blank" style="min-width: 140px;"></span> স্থানাধিকারী
          </div>
          <div class="body-text-line-wrapper">
            শ্রী/শ্রীমতী <span class="blank" style="min-width: 580px;"></span> কে শংসাপত্র প্রদত্ত হল।
          </div>
        </div>

        <!-- 4. Date & Place -->
        <div class="date-place">
          <div>তারিখ: <span class="blank" style="min-width: 140px;"></span></div>
          <div>স্থান: <span style="margin-left:8px;">মোংলাপাড়া মাঠ</span></div>
        </div>

        <!-- 5. Signatures -->
        <div class="signature-block">
          <div class="sig-col">
            <div class="sig-line-wrapper"><div class="sig-line"></div></div>
            <div class="sig-role">সভাপতি</div>
          </div>
          <div class="sig-col">
            <div class="sig-line-wrapper"><div class="sig-line"></div></div>
            <div class="sig-role">সম্পাদক</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <button class="downloadBtn" id="downloadBtn">Download Certificate (PNG)</button>

  <script>


    function resizeCertificate() {
      const wrapper = document.getElementById('scaleWrapper');
      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;
      const scaleX = (windowWidth - 40) / 1587;
      const scaleY = (windowHeight - 160) / 1123;
      const scale = Math.min(scaleX, scaleY, 1);
      wrapper.style.transform = `scale(${scale})`;
      wrapper.style.marginBottom = `-${1123 * (1 - scale)}px`;
    }

    window.addEventListener('resize', resizeCertificate);
    resizeCertificate();

    document.getElementById('downloadBtn').addEventListener('click', async () => {
      const btn = document.getElementById('downloadBtn');
      const originalText = btn.innerText;
      const resetBtn = () => { btn.innerText = originalText; btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; };

      // Mobile: show message instead of attempting export
      const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth <= 768;
      if (isMobile) {
        alert('For the best quality export, please open this certificate on a desktop or laptop browser and click Download.');
        return;
      }

      btn.innerText = 'Generating high-quality PNG...';
      btn.style.opacity = '0.7';
      btn.style.pointerEvents = 'none';

      try {
        const cert = document.getElementById('certificate');
        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 300));

        const canvas = await html2canvas(cert, {
          scale: 4,
          useCORS: true,
          backgroundColor: '#fffaf0',
          logging: false,
          letterRendering: 1,
          onclone: function(clonedDoc) {
            var sw = clonedDoc.getElementById('scaleWrapper');
            if (sw) { sw.style.transform = 'none'; sw.style.marginBottom = '0'; }
          }
        });

        const blob = await new Promise(function(resolve, reject) {
          canvas.toBlob(function(b) {
            if (b) resolve(b);
            else reject(new Error('Blob conversion failed'));
          }, 'image/png', 1.0);
        });

        const blobUrl = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = blobUrl;
        a.download = 'certificate.png';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(blobUrl); }, 2000);

        resetBtn();

      } catch (err) {
        console.error('Download error:', err);
        alert('Export failed: ' + err.message);
        resetBtn();
      }
    });
  </script>
</body>
</html>
